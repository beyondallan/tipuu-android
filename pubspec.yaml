name: tipuu
description: Tipuu - A cross-platform mobile application with hardware integration.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Network
  dio: ^5.4.1
  pretty_dio_logger: ^1.3.1

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  flutter_secure_storage: ^9.0.0

  # Hardware - Bluetooth
  flutter_blue_plus: ^1.32.0

  # Hardware - Audio
  flutter_sound: ^9.2.13
  permission_handler: ^11.3.0

  # Hardware - Connectivity
  connectivity_plus: ^6.0.2

  # UI
  go_router: ^14.0.0
  google_fonts: ^6.1.0

  # Utils
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  uuid: ^4.3.3
  logger: ^2.1.0
  result_dart: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/